<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>배당금 계산기 — 세후 실수령액 · 수익률 · 복리 재투자 시뮬레이션</title>
  <meta name="description" content="주식 배당금 계산기. 세후 실수령액, 배당수익률, 복리 재투자(DRIP) 시뮬레이션을 한 번에 계산하세요. 국내·미국 주식 세율 지원." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f7fa;
      --surface: #ffffff;
      --surface2: #f0f3f8;
      --border: #e2e8f0;
      --text: #1a202c;
      --text2: #64748b;
      --text3: #94a3b8;
      --green: #0d9488;
      --green-light: #f0fdfa;
      --blue: #2563eb;
      --blue-light: #eff6ff;
      --red: #dc2626;
      --red-light: #fef2f2;
      --amber: #d97706;
      --amber-light: #fffbeb;
      --radius: 12px;
      --radius-sm: 8px;
    }

    body {
      font-family: 'Pretendard', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.6;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 1.5rem;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-inner {
      max-width: 780px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
    }
    .logo span { color: var(--green); }
    .badge {
      font-size: 11px;
      background: var(--green-light);
      color: var(--green);
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 500;
    }

    main {
      max-width: 780px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    .hero {
      text-align: center;
      margin-bottom: 2rem;
    }
    .hero h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    .hero p {
      color: var(--text2);
      font-size: 15px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 1.25rem;
      background: var(--surface2);
      padding: 6px;
      border-radius: var(--radius);
    }
    .tab-btn {
      flex: 1;
      padding: 10px 8px;
      border: none;
      border-radius: var(--radius-sm);
      background: transparent;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      color: var(--text2);
      cursor: pointer;
      transition: all 0.15s;
    }
    .tab-btn.active {
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1rem;
    }

    .section-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 1rem;
    }

    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 520px) { .grid2 { grid-template-columns: 1fr; } }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 13px; color: var(--text2); font-weight: 500; }

    input[type="number"], select {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 15px;
      color: var(--text);
      background: var(--surface);
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="number"]:focus, select:focus {
      border-color: var(--green);
    }

    .freq-group { display: flex; gap: 8px; flex-wrap: wrap; }
    .freq-btn {
      padding: 8px 16px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      font-family: inherit;
      font-size: 14px;
      color: var(--text2);
      cursor: pointer;
      transition: all 0.15s;
    }
    .freq-btn.active {
      border-color: var(--green);
      background: var(--green-light);
      color: var(--green);
      font-weight: 600;
    }

    .calc-btn {
      width: 100%;
      padding: 14px;
      background: var(--green);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 1.25rem;
      transition: opacity 0.15s;
    }
    .calc-btn:hover { opacity: 0.9; }

    .metrics {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 1rem;
    }
    @media (max-width: 520px) { .metrics { grid-template-columns: 1fr 1fr; } }

    .metric {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
    }
    .metric.green { background: var(--green-light); border-color: #99f6e4; }
    .metric.blue  { background: var(--blue-light);  border-color: #bfdbfe; }
    .metric.red   { background: var(--red-light);   border-color: #fecaca; }
    .metric.amber { background: var(--amber-light);  border-color: #fde68a; }

    .metric-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; font-weight: 500; }
    .metric-value { font-size: 22px; font-weight: 600; color: var(--text); }
    .metric.green .metric-value { color: var(--green); }
    .metric.blue  .metric-value { color: var(--blue); }
    .metric.red   .metric-value { color: var(--red); }
    .metric.amber .metric-value { color: var(--amber); }

    .bar-section { margin-top: 0.5rem; }
    .bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    .bar-label { font-size: 13px; color: var(--text2); width: 80px; flex-shrink: 0; }
    .bar-track { flex: 1; height: 10px; background: var(--surface2); border-radius: 5px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 5px; transition: width 0.4s ease; }
    .bar-val { font-size: 13px; font-weight: 600; color: var(--text); min-width: 90px; text-align: right; }

    .note {
      font-size: 12px;
      color: var(--text3);
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    footer {
      text-align: center;
      padding: 2rem;
      color: var(--text3);
      font-size: 12px;
    }

    .hidden { display: none; }

    .info-box {
      background: var(--blue-light);
      border: 1px solid #bfdbfe;
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      font-size: 13px;
      color: #1e40af;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">배당금<span>계산기</span></div>
    <span class="badge">무료 · 광고 없음</span>
  </div>
</header>

<main>
  <div class="hero">
    <h1>배당금 계산기</h1>
    <p>세후 실수령액부터 복리 재투자 시뮬레이션까지</p>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('basic')">기본 계산</button>
    <button class="tab-btn" onclick="switchTab('yield')">수익률 계산</button>
    <button class="tab-btn" onclick="switchTab('drip')">복리 재투자</button>
  </div>

  <!-- 기본 계산 -->
  <div id="panel-basic" class="card">
    <div class="section-label">기본 정보</div>
    <div class="grid2" style="margin-bottom:16px;">
      <div class="field">
        <label>보유 주식 수 (주)</label>
        <input type="number" id="shares" value="100" min="1" />
      </div>
      <div class="field">
        <label>주당 배당금 (원)</label>
        <input type="number" id="dps" value="500" min="0" />
      </div>
    </div>
    <div class="field" style="margin-bottom:16px;">
      <label>배당 주기</label>
      <div class="freq-group">
        <button class="freq-btn" onclick="setFreq(12, this)">월 배당</button>
        <button class="freq-btn" onclick="setFreq(4, this)">분기 배당</button>
        <button class="freq-btn" onclick="setFreq(2, this)">반기 배당</button>
        <button class="freq-btn active" onclick="setFreq(1, this)">연 배당</button>
      </div>
    </div>
    <div class="field">
      <label>세율</label>
      <select id="taxrate">
        <option value="15.4">15.4% — 국내 배당소득세 (기본)</option>
        <option value="22">22% — 금융소득 종합과세 대상</option>
        <option value="15">15% — 미국 주식 (한미 조세조약)</option>
        <option value="0">0% — 세금 미포함</option>
      </select>
    </div>
    <button class="calc-btn" onclick="calcBasic()">계산하기</button>
  </div>

  <!-- 수익률 계산 -->
  <div id="panel-yield" class="card hidden">
    <div class="section-label">투자 정보</div>
    <div class="grid2" style="margin-bottom:16px;">
      <div class="field">
        <label>주당 현재가 (원)</label>
        <input type="number" id="price" value="25000" min="1" />
      </div>
      <div class="field">
        <label>보유 주식 수 (주)</label>
        <input type="number" id="shares2" value="100" min="1" />
      </div>
    </div>
    <div class="grid2">
      <div class="field">
        <label>연간 주당 배당금 (원)</label>
        <input type="number" id="dps2" value="500" min="0" />
      </div>
      <div class="field">
        <label>세율</label>
        <select id="taxrate2">
          <option value="15.4">15.4% — 국내</option>
          <option value="22">22% — 종합과세</option>
          <option value="15">15% — 미국 주식</option>
          <option value="0">0% — 세금 제외</option>
        </select>
      </div>
    </div>
    <button class="calc-btn" onclick="calcYield()">계산하기</button>
  </div>

  <!-- 복리 재투자 -->
  <div id="panel-drip" class="card hidden">
    <div class="info-box">배당금을 전액 재투자했을 때 장기 자산 성장을 시뮬레이션합니다.</div>
    <div class="section-label">투자 조건</div>
    <div class="grid2" style="margin-bottom:16px;">
      <div class="field">
        <label>초기 투자금 (원)</label>
        <input type="number" id="init" value="10000000" min="0" />
      </div>
      <div class="field">
        <label>연간 배당수익률 (%)</label>
        <input type="number" id="yieldrate" value="3" step="0.1" min="0" />
      </div>
    </div>
    <div class="grid2">
      <div class="field">
        <label>투자 기간 (년)</label>
        <input type="number" id="years" value="20" min="1" max="50" />
      </div>
      <div class="field">
        <label>세율</label>
        <select id="taxrate3">
          <option value="15.4">15.4% — 국내</option>
          <option value="22">22% — 종합과세</option>
          <option value="15">15% — 미국 주식</option>
          <option value="0">0% — 세금 제외</option>
        </select>
      </div>
    </div>
    <button class="calc-btn" onclick="calcDrip()">계산하기</button>
  </div>

  <!-- 결과 영역 -->
  <div id="result-area" class="hidden">
    <div class="metrics" id="metrics"></div>
    <div class="card">
      <div class="section-label">수익 분석</div>
      <div class="bar-section" id="bars"></div>
      <div class="note" id="note"></div>
    </div>
  </div>
</main>

<footer>
  본 계산기는 참고용이며 실제 세금과 다를 수 있습니다.<br>
  © 2026 배당금계산기
</footer>

<script>
  let freq = 1;

  function setFreq(f, el) {
    freq = f;
    document.querySelectorAll('.freq-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
  }

  function switchTab(tab) {
    ['basic','yield','drip'].forEach(t => {
      document.getElementById('panel-'+t).classList.toggle('hidden', t !== tab);
    });
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      b.classList.toggle('active', ['basic','yield','drip'][i] === tab);
    });
    document.getElementById('result-area').classList.add('hidden');
  }

  function fmt(n) {
    return Math.round(n).toLocaleString('ko-KR') + '원';
  }
  function fmtPct(n) {
    return parseFloat(n).toFixed(2) + '%';
  }

  function showMetrics(items) {
    const types = ['green','blue','red','amber'];
    document.getElementById('metrics').innerHTML = items.map((item, i) => `
      <div class="metric ${types[i] || ''}">
        <div class="metric-label">${item.label}</div>
        <div class="metric-value">${item.value}</div>
      </div>
    `).join('');
  }

  function showBars(items) {
    const max = Math.max(...items.map(i => i.val));
    document.getElementById('bars').innerHTML = items.map(item => `
      <div class="bar-row">
        <span class="bar-label">${item.label}</span>
        <div class="bar-track">
          <div class="bar-fill" style="width:${Math.min(100,(item.val/max)*100).toFixed(1)}%;background:${item.color};"></div>
        </div>
        <span class="bar-val">${fmt(item.val)}</span>
      </div>
    `).join('');
  }

  function calcBasic() {
    const shares = parseFloat(document.getElementById('shares').value) || 0;
    const dps = parseFloat(document.getElementById('dps').value) || 0;
    const tax = parseFloat(document.getElementById('taxrate').value) / 100;

    const annual = shares * dps * freq;
    const taxAmt = annual * tax;
    const net = annual - taxAmt;
    const perTime = net / freq;
    const freqLabel = {1:'연간',2:'반기별',4:'분기별',12:'월별'}[freq] || '';

    showMetrics([
      { label: '세전 연간 배당금', value: fmt(annual) },
      { label: freqLabel + ' 세후 수령액', value: fmt(perTime) },
      { label: '연간 배당소득세', value: fmt(taxAmt) },
      { label: '연간 세후 실수령', value: fmt(net) },
    ]);

    showBars([
      { label: '세전 배당', val: annual, color: '#2563eb' },
      { label: '소득세', val: taxAmt, color: '#dc2626' },
      { label: '세후 수령', val: net, color: '#0d9488' },
    ]);

    document.getElementById('note').textContent =
      `세율 ${(tax*100).toFixed(1)}% 적용 / 연 ${freq}회 배당 / 보유 ${shares.toLocaleString()}주 × 주당 ${dps.toLocaleString()}원`;

    document.getElementById('result-area').classList.remove('hidden');
    document.getElementById('result-area').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function calcYield() {
    const price = parseFloat(document.getElementById('price').value) || 1;
    const shares = parseFloat(document.getElementById('shares2').value) || 0;
    const dps = parseFloat(document.getElementById('dps2').value) || 0;
    const tax = parseFloat(document.getElementById('taxrate2').value) / 100;

    const invest = price * shares;
    const annual = shares * dps;
    const taxAmt = annual * tax;
    const net = annual - taxAmt;
    const yieldGross = (annual / invest) * 100;
    const yieldNet = (net / invest) * 100;

    showMetrics([
      { label: '총 투자금', value: fmt(invest) },
      { label: '세전 배당수익률', value: fmtPct(yieldGross) },
      { label: '세후 배당수익률', value: fmtPct(yieldNet) },
      { label: '연간 세후 실수령', value: fmt(net) },
    ]);

    showBars([
      { label: '총 투자금', val: invest, color: '#94a3b8' },
      { label: '세전 배당', val: annual, color: '#2563eb' },
      { label: '세후 수령', val: net, color: '#0d9488' },
    ]);

    document.getElementById('note').textContent =
      `투자금 ${fmt(invest)} / 세전 수익률 ${fmtPct(yieldGross)} / 세후 수익률 ${fmtPct(yieldNet)}`;

    document.getElementById('result-area').classList.remove('hidden');
    document.getElementById('result-area').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function calcDrip() {
    const init = parseFloat(document.getElementById('init').value) || 0;
    const yieldRate = parseFloat(document.getElementById('yieldrate').value) / 100;
    const years = parseInt(document.getElementById('years').value) || 1;
    const tax = parseFloat(document.getElementById('taxrate3').value) / 100;

    let total = init;
    let totalDiv = 0;
    for (let i = 0; i < years; i++) {
      const div = total * yieldRate;
      const netDiv = div * (1 - tax);
      totalDiv += netDiv;
      total += netDiv;
    }
    const totalReturn = ((total - init) / init) * 100;

    showMetrics([
      { label: '초기 투자금', value: fmt(init) },
      { label: '누적 배당 수령액', value: fmt(totalDiv) },
      { label: '최종 자산', value: fmt(total) },
      { label: '총 수익률', value: fmtPct(totalReturn) },
    ]);

    showBars([
      { label: '원금', val: init, color: '#94a3b8' },
      { label: '배당 수익', val: totalDiv, color: '#0d9488' },
      { label: '최종 자산', val: total, color: '#2563eb' },
    ]);

    document.getElementById('note').textContent =
      `${years}년 복리 재투자 / 연 수익률 ${(yieldRate*100).toFixed(1)}% / 세율 ${(tax*100).toFixed(1)}% 적용`;

    document.getElementById('result-area').classList.remove('hidden');
    document.getElementById('result-area').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
</script>
</body>
</html>
